[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/share-summary"
  to = "/.netlify/functions/share-summary"
  status = 200

[[redirects]]
  from = "/api/share-summary/:token"
  to = "/.netlify/functions/get-share-summary?token=:token"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
