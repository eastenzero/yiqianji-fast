<!DOCTYPE html>

<html lang="zh-CN"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Public Sans', sans-serif; }
        h1, h2, h3, .font-lexend { font-family: 'Lexend', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="docked full-width top-0 sticky z-50 bg-slate-50/80 dark:bg-slate-900/80 backdrop-blur-lg">
<nav class="flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-2">
<div class="p-2 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-full transition-all scale-95 active:opacity-80 transition-transform duration-200">
<span class="material-symbols-outlined text-[#2C7DA0] dark:text-cyan-400">chevron_left</span>
</div>
<span class="text-xl font-bold text-[#2C7DA0] dark:text-cyan-400 font-['Lexend']">Health Guardian</span>
</div>
<button class="text-slate-500 dark:text-slate-400 font-medium hover:bg-slate-200/50 p-2 px-4 rounded-full transition-all">Skip</button>
</nav>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pb-12 max-w-2xl mx-auto w-full">
<!-- Illustration Section: Organic Asymmetric Layout -->
<div class="relative w-full aspect-square max-h-[400px] mb-12 flex items-center justify-center overflow-hidden">
<!-- Background Decorative Element -->
<div class="absolute inset-0 bg-primary-fixed/20 rounded-full blur-3xl -z-10 transform scale-75"></div>
<!-- Floating Illustration Elements -->
<div class="relative w-full h-full">
<!-- Medicine Box Icon -->
<div class="absolute top-[10%] right-[15%] w-32 h-32 bg-surface-container-lowest shadow-xl rounded-xl p-4 transform rotate-12 flex flex-col justify-between">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-primary text-3xl">pill</span>
<div class="w-8 h-2 bg-surface-container-high rounded-full"></div>
</div>
<div class="space-y-2">
<div class="w-full h-1 bg-surface-container-high rounded-full"></div>
<div class="w-2/3 h-1 bg-surface-container-high rounded-full"></div>
</div>
</div>
<!-- Report Form -->
<div class="absolute top-[35%] left-[5%] w-40 h-52 bg-surface-container-lowest shadow-lg rounded-lg p-5 transform -rotate-6 border-l-4 border-primary">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-secondary text-xl">description</span>
<div class="w-12 h-2 bg-surface-container-high rounded-full"></div>
</div>
<div class="space-y-3">
<div class="w-full h-1.5 bg-surface-container shadow-inner rounded-full"></div>
<div class="w-full h-1.5 bg-surface-container shadow-inner rounded-full"></div>
<div class="w-3/4 h-1.5 bg-surface-container shadow-inner rounded-full"></div>
<div class="flex gap-2 mt-4">
<div class="w-6 h-6 rounded-full bg-secondary-container"></div>
<div class="w-6 h-6 rounded-full bg-primary-fixed"></div>
</div>
</div>
</div>
<!-- Calendar Icon -->
<div class="absolute bottom-[15%] right-[10%] w-28 h-28 bg-surface-container-lowest shadow-2xl rounded-2xl overflow-hidden transform -rotate-12">
<div class="bg-error w-full h-6 flex items-center justify-center">
<div class="flex gap-1">
<div class="w-1 h-1 bg-white/50 rounded-full"></div>
<div class="w-1 h-1 bg-white/50 rounded-full"></div>
</div>
</div>
<div class="flex flex-col items-center justify-center h-22 p-2">
<span class="material-symbols-outlined text-error text-4xl" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
</div>
</div>
<!-- Central Visual Anchor (Abstract Healthcare Shape) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-gradient-to-br from-primary to-primary-container rounded-full opacity-10 blur-2xl"></div>
<img alt="Empathetic Healthcare" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-56 h-56 object-cover rounded-full mix-blend-multiply opacity-20 grayscale" data-alt="abstract artistic healthcare scene with soft clinical lighting and medicinal elements in a clean editorial style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDaK1yuwhKFxM0K2TfWQYE907oPZtx8ER95brKDAfq5ZxJrG7BIhSREX-sQYAIG5s6bOAebtXqu6o1C-JGMzIotQVT8UpdJvUz2zhS8n62DLKmLMgEQft1zX7NA-uVXPKZcwk-Nq4SWqRKhQaHOXlPrLqA6Y7gMAwA06wwq5g0ty9POFxEk3660pOgWb7w67CH4XYPkPOL-yuEZeFGzTmL9dR__p6kkgbmvMPfRhtolRkTrcqR99t1ggUhhSxbK7DmPGKMSix_iMALy"/>
</div>
</div>
<!-- Text Content -->
<div class="text-center space-y-6 max-w-sm">
<h1 class="text-3xl md:text-4xl font-headline font-bold text-on-surface tracking-tight leading-tight">
                就诊前最头疼的事，我们帮你整理
            </h1>
<p class="text-on-surface-variant text-lg leading-relaxed font-body">
                记录病史、整理病历、用药清单，这些繁琐的准备工作，现在都可以交给我们专业地引导您完成。
            </p>
</div>
</main>
<!-- Bottom Actions Area -->
<footer class="mt-auto px-6 pb-12 w-full max-w-2xl mx-auto space-y-8">
<!-- Page Indicator Dots -->
<div class="flex justify-center items-center gap-3">
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
<div class="w-8 h-2.5 rounded-full bg-primary-container"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Primary Action Button -->
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-on-primary text-lg font-semibold rounded-xl shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            下一步
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</footer>
</body></html>
